<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>キャラクター Tier表</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-wrap">

    <div class="tr-search">
      <input type="text" id="trSearch" placeholder="キャラクター名・タイプで検索..." oninput="trFilter()" />
      <select id="trType" onchange="trFilter()">
        <option value="">全タイプ</option>
        <option value="スピード">スピード型</option>
        <option value="スタミナ">スタミナ型</option>
        <option value="パワー">パワー型</option>
        <option value="賢さ">賢さ型</option>
      </select>
    </div>

    <div id="trList"></div>

    <div id="trPanel" class="tr-panel">
      <div class="tr-panel-header">
        <div class="tr-panel-avatar" id="trPAvatar"></div>
        <div class="tr-panel-info">
          <div class="tr-panel-name" id="trPName"></div>
          <div class="tr-panel-sub"  id="trPSub"></div>
          <div id="trPBadge" class="tr-tier-badge"></div>
        </div>
      </div>
      <div class="tr-panel-body">
        <div class="tr-panel-col">
          <div class="tr-section-label">Status</div>
          <div id="trPBars"></div>
        </div>
        <div class="tr-panel-col">
          <div class="tr-section-label">Skills</div>
          <div id="trPSkills"></div>
        </div>
      </div>
    </div>

  </div>
  <script src="data.js"></script>
</body>
</html>
